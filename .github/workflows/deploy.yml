name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

# Triggered on every push to main (i.e. PR merge), but the deploy job
# only runs when package.json#version changed vs the previous commit.
# This pairs with version-guard.yml on PRs: PRs that touch shipped code
# must bump the version, and that bump is what fires the deploy.
# Pure-metadata PRs (skip-version-bump label) leave the version alone
# and therefore don't redeploy.
#
# A successful deploy also tags v<version> and publishes a GitHub
# release. Release notes come from the merging PR's body (the `##
# Release notes` section, enforced by release-notes-guard.yml on PRs);
# falls back to GitHub's auto-generated notes if the section can't be
# found (e.g. non-squash merges, or pre-guard historical state).

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          set -euo pipefail
          new=$(jq -r .version package.json)
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            old=$(git show HEAD~1:package.json | jq -r .version)
          else
            old=""
          fi
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "Current version: $new"
          echo "Previous version: ${old:-<none>}"
          if [ "$new" = "$old" ]; then
            echo "Version unchanged — skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed — deploying."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.detect-version-change.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists — skipping tag/release."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"

          # Extract release notes from the merging PR's body. Squash
          # merges put '(#NN)' at the end of the commit subject; pull
          # the last such number out and fetch its body via gh.
          notes_file=""
          subject=$(git log -1 --pretty=%s HEAD)
          pr=$(printf '%s' "$subject" | grep -oE '#[0-9]+' | tail -1 | tr -d '#' || true)
          if [ -n "${pr:-}" ]; then
            body=$(gh pr view "$pr" --json body --jq .body 2>/dev/null || true)
            if [ -n "${body:-}" ]; then
              section=$(printf '%s\n' "$body" | awk '
                /^## Release notes[[:space:]]*$/ { capture=1; next }
                /^## / && capture { exit }
                capture { print }
              ')
              stripped=$(printf '%s' "$section" | perl -0777 -pe 's/<!--.*?-->//gs')
              if printf '%s' "$stripped" | grep -qE '[^[:space:]]'; then
                notes_file=$(mktemp)
                printf '%s' "$stripped" > "$notes_file"
                echo "Using release notes from PR #${pr}."
              else
                echo "PR #${pr} body has no usable '## Release notes' section — falling back to --generate-notes."
              fi
            else
              echo "Could not fetch body for PR #${pr} — falling back to --generate-notes."
            fi
          else
            echo "No PR number in commit subject — falling back to --generate-notes."
          fi

          if [ -n "$notes_file" ]; then
            gh release create "${tag}" --title "${tag}" --notes-file "$notes_file"
          else
            gh release create "${tag}" --title "${tag}" --generate-notes
          fi
