name = "stellata"
compatibility_date = "2026-04-22"

# stellata.xyz served at the apex via assets-only deploy. routes must come
# before [assets] — TOML scopes subsequent keys to whatever section
# precedes them.
routes = [
  { pattern = "stellata.xyz", zone_name = "stellata.xyz" },
  { pattern = "stellata.xyz/*", zone_name = "stellata.xyz" },
]

[assets]
directory = "./dist"
