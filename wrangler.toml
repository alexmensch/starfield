name = "stellata"
main = "src/worker.ts"
compatibility_date = "2026-04-22"
placement = { mode = "smart" }

# Route mounts the app at alxm.me/stellata. The Worker strips the /stellata
# prefix before handing requests to the static-assets binding.
# NOTE: `routes` must come before [assets] — TOML scopes subsequent keys to
# whatever section precedes them.
routes = [
  { pattern = "alxm.me/stellata", zone_name = "alxm.me" },
  { pattern = "alxm.me/stellata/*", zone_name = "alxm.me" },
]

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 0.1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
